<h2>Por capital</h2>
<hr>
<div class="row">
  <div class="col">
   <shared-search-box (onValue)="searchByCountry($event)"
   [initialValue]="initialValue"
   placeholder="Búsqueda por país" ></shared-search-box>
  </div>
</div>

<div class="row">
  <div class="col">
    <hr>
    <shared-loading-spinner *ngIf="isLoading"></shared-loading-spinner>
    <countries-table [countries]="countries"></countries-table>
  </div>
</div>
